<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stock Detail</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📈</text></svg>">
<script>document.write(`<link rel="stylesheet" href="style.css?v=${Date.now()}">`);</script>
</head>
<body>
<a class="back" href="index.html">← Back to dashboard</a>
<div class="detail-head" id="head"></div>
<div class="cols">
  <div class="panel" style="--i:0">
    <h2>Last 4 candles + next-candle read</h2>
    <div class="chips-row" id="chips"></div>
    <div class="chartrow">
      <div class="main" id="candles"></div>
      <div class="profile">
        <div class="mini-h">Volume profile <small>(5d · 15m)</small></div>
        <div id="vp"></div>
      </div>
    </div>
    <div id="patterns"></div>
    <div class="interp" id="interp"></div>
  </div>
  <div class="stack">
    <div class="panel" style="--i:1">
      <h2>Analysis</h2>
      <ul class="points" id="points"></ul>
    </div>
    <div class="panel" style="--i:2">
      <h2>News</h2>
      <ul class="newslist" id="news"></ul>
    </div>
  </div>
</div>

<div class="panel wide" style="--i:3" id="gapPanel">
  <h2>Prediction gap — model forecast vs real closes</h2>
  <div class="chips-row" id="gapChips"></div>
  <div id="gapChart"></div>
  <div class="cal-box" id="gapCal" hidden></div>
  <div class="struct-note" id="gapNote"></div>
</div>

<div class="panel wide" style="--i:4" id="structPanel" hidden>
  <h2>Market structure & support map — 2 years daily</h2>
  <div class="chips-row" id="structChips"></div>
  <div id="structChart"></div>
  <div class="struct-note" id="structNote"></div>
</div>

<div class="panel wide" style="--i:4" id="btPanel" hidden>
  <h2>MSL-trail backtest — 2 years, walk-forward</h2>
  <div class="chips-row" id="btChips"></div>
  <div id="btChart"></div>
  <div class="struct-note" id="btNote"></div>
</div>

<footer id="foot"></footer>

<script>
// cache-bust every load so scheduled-scan updates always come through
["data.js", "structure.js", "backtest.js", "analysis.js", "predictions.js", "news.js", "model_eval.js", "charts.js"]
  .forEach(f => document.write(`<script src="${f}?v=${Date.now()}"><\/script>`));
</script>
<script>
const key = new URLSearchParams(location.search).get("s");
const s = STOCK_DATA[key], a = ANALYSIS[key], p = PREDICTIONS[key];
if (!s || !a || !p) {
  document.body.innerHTML = '<a class="back" href="index.html">← Back</a><p style="margin-top:20px">Unknown symbol.</p>';
} else {
  document.title = key + " — Detail";
  const ch = dayChange(s.candles);
  const up = ch.abs >= 0, cls = up ? "up" : "down", sign = up ? "+" : "";
  document.getElementById("head").innerHTML =
    `<h1>${key}</h1><span class="sub">${s.label}</span>
     <span class="price">${fmt(ch.last)} <small style="color:var(--muted)">${s.currency}</small></span>
     <span class="chg ${cls}">${sign}${fmt(ch.abs)} (${sign}${ch.pct.toFixed(2)}%)</span>`;

  document.getElementById("chips").innerHTML = indicatorChips(s.candles) + predOutcomeChip(key);

  const last4 = s.candles.slice(-4);
  const pred = buildPrediction(p.baseClose, p);
  const levels = [
    { p: p.stop, label: "stop loss", color: RED },
    { p: p.support, label: "support", color: GREEN },
  ];
  document.getElementById("candles").innerHTML = candleChart(last4, pred, levels);
  document.getElementById("vp").innerHTML = volumeProfileChart(s.profile, ch.last);

  const pats = detectPatterns(s.candles);
  document.getElementById("patterns").innerHTML = pats.length
    ? `<div class="mini-h">Patterns detected (latest candles)</div>` + pats.map(x =>
        `<div class="pat-line"><span class="badge ${x.dir}">${x.label}</span> <span class="read">${x.note}</span></div>`).join("")
    : `<div class="sub" style="margin-top:12px">No notable candlestick patterns in the latest sessions.</div>`;

  const pc = dirColor(p.dir);
  document.getElementById("interp").innerHTML =
    `<span class="tag">Next-candle guess — not financial advice</span>
     <div style="margin:4px 0 8px"><b style="color:${pc}">${
       p.dir === "up" ? "Leaning green" : p.dir === "down" ? "Leaning red" : "Indecision"
     }</b> · guessed close ≈ ${fmt(pred.c)} (range ${fmt(pred.l)}–${fmt(pred.h)}) · made ${p.madeAt} off close ${fmt(p.baseClose)}</div>
     ${p.text}`;

  document.getElementById("points").innerHTML = a.bullets.map(b => `<li>${b}</li>`).join("");

  document.getElementById("news").innerHTML = (NEWS[key] || []).map(t =>
    `<li><b>${t.d}</b> — ${t.url ? `<a href="${t.url}" target="_blank" rel="noopener">${t.t}</a>` : t.t}
     <span class="read">${t.read}</span> <small class="src">${t.src || ""}</small></li>`).join("") ||
    `<li class="sub">No stored news for this symbol yet.</li>`;

  document.getElementById("foot").textContent = "Candles: Yahoo Finance daily. The dashed candle is Claude's interpretation of the next session. POC = price level with the heaviest traded volume. " + MACRO_NOTE;

  const st = typeof STRUCTURE !== "undefined" && STRUCTURE[key];
  if (st && st.sessions >= 30) {
    document.getElementById("structPanel").hidden = false;
    document.getElementById("structChips").innerHTML = structChips(st, ch.last);
    document.getElementById("structChart").innerHTML = structureChart(st);
    document.getElementById("structNote").textContent =
      `Evaluated over ${st.sessions} sessions (${st.span[0]} → ${st.span[1]}), showing the last ${st.candles.length}. ` +
      `Swings (▲ MSL / ▼ MSH) are 3-bar fractals, confirmed only — no hindsight. Shaded bands are price areas with ≥3 historical swing touches over the full 2 years. ` +
      `Trail logic: exit signal = daily CLOSE below the last MSL (dashed red); the dotted line adds a 1-ATR buffer against wick hunts. Gap risk is not covered by any stop — size accordingly.`;
  }

  const bt = typeof BACKTEST !== "undefined" && BACKTEST[key];
  if (bt && bt.equity.dates.length >= 30) {
    document.getElementById("btPanel").hidden = false;
    const ba = bt.raw.stats, bb = bt.buffered.stats;
    const beat = ba.stratRet > ba.bhRet, beatB = bb.stratRet > bb.bhRet;
    document.getElementById("btChips").innerHTML = `
      <span class="chip"><i class="dot" style="background:${GREEN}"></i>Raw MSL trail <b style="color:${beat ? GREEN : RED}">${ba.stratRet > 0 ? "+" : ""}${ba.stratRet}%</b></span>
      <span class="chip"><i class="dot" style="background:${MA5C}"></i>Buffered −1 ATR <b style="color:${beatB ? GREEN : RED}">${bb.stratRet > 0 ? "+" : ""}${bb.stratRet}%</b> (${bb.trades} trades)</span>
      <span class="chip"><i class="dot" style="background:${FLAT}"></i>Buy & hold <b>${ba.bhRet > 0 ? "+" : ""}${ba.bhRet}%</b></span>
      <span class="chip">Max drawdown <b style="color:${GREEN}">${ba.stratDD}%</b> vs B&H <b style="color:${RED}">${ba.bhDD}%</b></span>
      <span class="chip">${ba.trades} trades · ${ba.winRate ?? "–"}% win · ${ba.whipsaws} whipsaws${ba.open ? " · 1 open" : ""}</span>`;
    document.getElementById("btChart").innerHTML = equityChart(bt.equity);
    const verdict = beat || beatB
      ? "On this stock the trail rule kept most (or more) of the upside with a smaller drawdown — it has earned its keep here."
      : ba.stratDD < ba.bhDD
        ? "On this stock the trail rule gave up meaningful upside to whipsaws — its only payment was the smaller drawdown. Consider it insurance, not alpha, here."
        : "On this stock the rule neither beat buy-and-hold nor reduced drawdown — structure trailing fits trending charts, and this one chops.";
    document.getElementById("btNote").textContent =
      `Rules: enter when a daily close breaks the last confirmed MSH; exit when a daily close breaks the last confirmed MSL (raw) or MSL − 1 ATR (buffered). ` +
      `Swings confirm 3 bars late (walk-forward, no lookahead); fills at signal-day close; no costs; long-only. Span ${bt.span[0]} → ${bt.span[1]}. ` + verdict;
  }

  const me = typeof MODEL_EVAL !== "undefined" && MODEL_EVAL[key];
  const calEl = document.getElementById("gapCal");
  if (me && !me.insufficient) {
    const gap = predictionGapChart(s.candles, me.recent, me.next);
    document.getElementById("gapChart").innerHTML = gap.svg;
    const st = me.stats, nx = me.next, wts = me.weights;
    const dcol = st.dirAcc >= 55 ? GREEN : st.dirAcc >= 48 ? MA5C : RED;
    const mcol = st.mae <= 2 ? GREEN : st.mae <= 4 ? MA5C : RED;
    const rcol = Math.abs(st.rangeHit - 70) <= 12 ? GREEN : MA5C;
    const ncol = nx.dir === "rise" ? GREEN : RED;
    const biasTxt = st.bias > 0.05 ? `runs ${st.bias}% low` : st.bias < -0.05 ? `runs ${Math.abs(st.bias)}% high` : "≈ unbiased";
    const gb = me.gapBehavior;
    const gbCol = gb === "continue" ? GREEN : gb === "fade" ? RED : FLAT;
    const gbTxt = gb === "continue" ? "gaps continue ↗" : gb === "fade" ? "gaps fade ↘" : "gap-neutral";
    const lastGapTxt = Math.abs(me.lastGapPct) >= 1 ? ` · today ${me.lastGapPct >= 0 ? "+" : ""}${me.lastGapPct}%` : "";
    document.getElementById("gapChips").innerHTML = `
      <span class="chip" title="held-out bars the model never trained on">Out-of-sample <b>${st.n}</b> bars</span>
      <span class="chip">Direction <b style="color:${dcol}">${st.dirAcc}%</b></span>
      <span class="chip">Avg close miss <b style="color:${mcol}">${st.mae}%</b> (${biasTxt})</span>
      <span class="chip">Range caught close <b style="color:${rcol}">${st.rangeHit}%</b></span>
      <span class="chip" title="Whether this stock's opening gaps historically continue or fill the next day">Gap behavior <b style="color:${gbCol}">${gbTxt}</b>${lastGapTxt}</span>
      <span class="chip">Next-bar call <b style="color:${ncol}">${nx.dir === "rise" ? "▲" : "▼"} ${fmt(nx.predC)}</b> ${nx.pct >= 0 ? "+" : ""}${nx.pct}% · ${fmt(nx.predL)}–${fmt(nx.predH)}</span>`;
    const gbSentence = gb === "continue" ? "Its opening gaps historically tend to <b>continue</b> the next day (gap-and-go)." : gb === "fade" ? "Its opening gaps historically tend to <b>fade / fill</b> the next day." : "Opening gaps carry no reliable next-day signal here.";
    calEl.innerHTML = `<span class="cal-tag">Model · learned from ${me.bars} past bars</span>
      Weights grid-searched on a training split: trend ×${wts.wd}, momentum ×${wts.wm}, mean-reversion ×${wts.wr}, gap ×${wts.wg}, debias ${(wts.bias * 100).toFixed(2)}%, range k=${wts.k}. ${gbSentence}
      Stats above are measured on later, unseen bars — an honest track record, not a curve-fit.`;
    calEl.hidden = false;
    document.getElementById("gapNote").textContent =
      "Each amber tick is the close the model forecast for that day using ONLY the bars before it (walk-forward, no lookahead); the dashed bracket is its predicted range; the colored band is the gap to the real close (green ≤1% miss, amber ≤3%, red beyond); ✓/✗ = direction. The right-edge dashed marker is the model's call for the next session.";
  } else {
    document.getElementById("gapChart").innerHTML = predictionGapChart(s.candles, [], null).svg;
    document.getElementById("gapChips").innerHTML = `<span class="chip">Not enough history yet</span>`;
    calEl.hidden = true;
    document.getElementById("gapNote").textContent =
      "This name has too few sessions for a walk-forward model (needs ~80 daily bars) — common right after an IPO. It populates automatically as history accumulates.";
  }

  // Pick up fresh data written by the scheduled scan.
  setTimeout(() => location.reload(), 10 * 60 * 1000);
}
</script>
</body>
</html>
